name: main

on:
  push:
    branches:
      - 'main'

env:
  TEST_TAG: aleksved/js-fastify-blog:test
  IMAGE_NAME: aleksved/js-fastify-blog

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Строим тестовый образ для проверок
      - uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.TEST_TAG }}

      # Линтинг и тесты внутри собранного контейнера
      - run: docker run --rm ${{ env.TEST_TAG }} npm run lint
      - run: docker run --rm ${{ env.TEST_TAG }} npm test

      # Если тесты прошли — обновляем :latest на Docker Hub
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest